# 智能外卖柜后端配置
# 敏感信息（数据库密码等）请在 .env 文件中配置，参见 .env.example

server:
  host: "0.0.0.0"
  port: 8080
  static_dir: "web/dist"  # 前端构建产物目录（留空则不托管前端）

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  # password 请在 .env 中配置 DB_PASSWORD
  dbname: "smart_cabinet"

mcu:
  host: "0.0.0.0"
  port: 9090
  heartbeat_sec: 5       # 心跳间隔（秒）
  heartbeat_timeout: 15  # 心跳超时（秒），超时判定 MCU 离线
